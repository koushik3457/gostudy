<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Library</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #a0eefd;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 {
      text-align: center;
    }
    .video {
      display: flex;
      align-items: center;
      margin: 15px 0;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .video img {
      width: 120px;
      margin-right: 15px;
    }
    .video a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>My YouTube Video Library</h1>

  <div class="video">

    </a>
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">

    </a>
  </div>

</html>
